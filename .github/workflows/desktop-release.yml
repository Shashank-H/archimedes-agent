name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      release_version: ${{ steps.validate.outputs.release_version }}
      prerelease: ${{ steps.validate.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format and main ancestry
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$ ]]; then
            echo "Release tags must match v<major>.<minor>.<patch>[-prerelease][+build]. Received: $tag" >&2
            exit 1
          fi

          version="${BASH_REMATCH[1]}"

          git fetch origin main --depth=1

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $tag points to commit $GITHUB_SHA, which is not contained in origin/main." >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Build ${{ matrix.platform }} release
    needs: validate-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            architecture: x64
            bundles: deb,appimage,rpm
          - platform: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
            bundles: ''
          - platform: macos
            runner: macos-13
            target: x86_64-apple-darwin
            architecture: x64
            bundles: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Inject release version
        run: node scripts/prepare-release-version.mjs "${{ needs.validate-release.outputs.release_version }}"

      - name: Build desktop bundles
        shell: bash
        env:
          BUNDLES: ${{ matrix.bundles }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          args=(build --ci --target "$TARGET")
          if [[ -n "$BUNDLES" ]]; then
            args+=(--bundles "$BUNDLES")
          fi

          npm run tauri -- "${args[@]}"

      - name: Verify bundle output
        shell: bash
        run: |
          set -euo pipefail
          find src-tauri/target -path '*/release/bundle/*' -type f | sort

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: archimedes-agent-${{ matrix.platform }}-${{ matrix.architecture }}-v${{ needs.validate-release.outputs.release_version }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
            src-tauri/target/release/bundle/**/*

  publish-release:
    name: Publish GitHub release
    needs:
      - validate-release
      - build-desktop
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: archimedes-agent-*
          merge-multiple: false

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release.outputs.release_tag }}
          name: Archimedes Agent ${{ needs.validate-release.outputs.release_tag }}
          generate_release_notes: true
          prerelease: ${{ needs.validate-release.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          files: |
            release-artifacts/**/*
